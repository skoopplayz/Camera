<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Material Camera Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #0b57d0;
            --md-sys-color-surface: #f8f9fa;
            --md-sys-color-on-surface: #1f1f1f;
            --md-sys-color-secondary-container: #d3e3fd;
            --md-sys-color-on-secondary-container: #041e49;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: #000;
            color: var(--md-sys-color-on-surface);
            margin: 0;
            height: 100vh;
            /* Prevent rubber-banding on iOS */
            position: fixed;
            width: 100%;
            overflow: hidden;
            font-family: 'Google Sans', 'Roboto', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transition: filter 0.2s ease;
        }

        .glass-ui {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            padding: 5px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shutter-btn:active { transform: scale(0.9); }

        .shutter-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-video .shutter-inner { background-color: #d93025; }
        
        .recording .shutter-inner {
            border-radius: 12px;
            transform: scale(0.5);
            background-color: #d93025;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 100;
            padding-bottom: calc(1.5rem + var(--safe-bottom));
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.active { transform: translateY(0); }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 90;
        }
        .sheet-overlay.active { opacity: 1; pointer-events: auto; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .active-chip {
            background-color: var(--md-sys-color-secondary-container) !important;
            color: var(--md-sys-color-on-secondary-container) !important;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            overflow-y: auto;
        }

        .gallery-item {
            aspect-ratio: 1;
            position: relative;
            background: #121212;
            overflow: hidden;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .lightbox.active { display: flex; }

        /* Custom Header spacing for iOS notch */
        .app-header {
            padding-top: calc(1rem + var(--safe-top));
        }

        /* Custom Footer spacing for iOS home indicator */
        .app-footer {
            padding-bottom: calc(2.5rem + var(--safe-bottom));
        }

        .recording-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <main class="relative flex-grow overflow-hidden">
        <!-- iOS Mandatory: playsinline, muted, webkit-playsinline -->
        <video id="video-preview" autoplay playsinline muted webkit-playsinline></video>

        <!-- Dynamic Grid Overlay -->
        <div id="camera-grid" class="absolute inset-0 grid grid-cols-3 grid-rows-3 pointer-events-none opacity-0 transition-opacity">
            <div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div>
            <div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div>
            <div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div><div class="border-[0.5px] border-white/20"></div>
        </div>

        <div id="timer-display" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[140px] text-white font-medium hidden z-50 drop-shadow-2xl"></div>

        <!-- Top Controls (Safe Area Integrated) -->
        <div class="app-header absolute top-0 left-0 w-full px-4 z-40">
            <div class="glass-ui flex items-center h-14 px-3 gap-2">
                <button id="flash-btn" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-800">
                    <span class="material-symbols-rounded">flash_off</span>
                </button>
                <div class="flex-grow text-center">
                    <span id="recording-indicator" class="hidden text-red-600 recording-pulse mr-1">●</span>
                    <span id="status-text" class="text-sm font-medium text-gray-800 tracking-tight">Camera Pro</span>
                </div>
                <button id="settings-trigger" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-800">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>
        </div>

        <!-- Capture Controls (Safe Area Integrated) -->
        <div class="app-footer absolute bottom-0 left-0 w-full flex flex-col items-center gap-10 z-40">
            <!-- Mode Switcher -->
            <div id="mode-switcher" class="glass-ui flex p-1 gap-1">
                <button id="btn-photo" class="px-8 py-2 rounded-full text-sm font-medium bg-blue-100 text-blue-900 transition-all">Photo</button>
                <button id="btn-video" class="px-8 py-2 rounded-full text-sm font-medium text-gray-600 transition-all">Video</button>
            </div>

            <!-- Main Buttons Row -->
            <div class="flex items-center gap-10">
                <button id="gallery-trigger" class="w-14 h-14 rounded-2xl bg-black/40 border border-white/10 overflow-hidden backdrop-blur-xl flex items-center justify-center">
                    <span id="gallery-empty" class="material-symbols-rounded text-white/50 text-2xl">photo_library</span>
                    <img id="last-thumb" class="hidden w-full h-full object-cover">
                </button>

                <button id="shutter" class="shutter-btn">
                    <div class="shutter-inner"></div>
                </button>

                <button id="flip-btn" class="w-14 h-14 rounded-full bg-black/40 border border-white/10 backdrop-blur-xl flex items-center justify-center">
                    <span class="material-symbols-rounded text-white text-3xl">flip_camera_android</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Sheets & Lightbox -->
    <div id="overlay" class="sheet-overlay"></div>

    <!-- Settings Sheet -->
    <div id="settings-sheet" class="bottom-sheet">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto my-4"></div>
        <div class="px-6 space-y-8 pb-4">
            <h2 class="text-2xl font-medium">Settings</h2>
            
            <section class="space-y-4">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Resolution</label>
                <div class="flex gap-2">
                    <button data-res="HD" class="res-btn flex-1 py-4 rounded-2xl border border-gray-100 bg-blue-50 text-blue-700 text-sm font-medium">Full HD</button>
                    <button data-res="4K" class="res-btn flex-1 py-4 rounded-2xl border border-gray-100 bg-white text-gray-600 text-sm font-medium">4K Ultra</button>
                </div>
            </section>

            <section class="space-y-4">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Timer</label>
                <div class="flex gap-2">
                    <button data-timer="0" class="timer-btn flex-1 py-3 rounded-2xl bg-blue-50 text-blue-700 text-sm">Off</button>
                    <button data-timer="3" class="timer-btn flex-1 py-3 rounded-2xl bg-white text-gray-600 text-sm">3s</button>
                    <button data-timer="10" class="timer-btn flex-1 py-3 rounded-2xl bg-white text-gray-600 text-sm">10s</button>
                </div>
            </section>

            <section class="flex items-center justify-between py-2">
                <div>
                    <p class="font-medium">Assistive Grid</p>
                    <p class="text-sm text-gray-500">Show 3x3 framing lines</p>
                </div>
                <input type="checkbox" id="grid-toggle" class="w-6 h-6 rounded-md">
            </section>
        </div>
    </div>

    <!-- Gallery Sheet -->
    <div id="gallery-sheet" class="bottom-sheet">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto my-4"></div>
        <div class="flex items-center justify-between px-6 mb-4">
            <h2 class="text-2xl font-medium">Gallery</h2>
            <button id="select-mode-btn" class="text-sm font-medium text-blue-600">Select</button>
        </div>
        
        <div class="flex px-6 gap-2 mb-4 overflow-x-auto no-scrollbar">
            <button data-filter="all" class="filter-chip active-chip px-4 py-2 rounded-full bg-gray-100 text-sm whitespace-nowrap">All Media</button>
            <button data-filter="photo" class="filter-chip px-4 py-2 rounded-full bg-gray-100 text-sm whitespace-nowrap">Photos</button>
            <button data-filter="video" class="filter-chip px-4 py-2 rounded-full bg-gray-100 text-sm whitespace-nowrap">Videos</button>
        </div>

        <div id="gallery-content" class="gallery-grid no-scrollbar flex-grow px-0.5"></div>

        <div id="batch-actions" class="hidden px-6 py-4 flex gap-4 bg-white border-t border-gray-100">
            <button id="download-zip" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-medium">Save All</button>
            <button id="delete-batch" class="flex-1 py-3 rounded-2xl bg-red-50 text-red-600 font-medium">Delete</button>
        </div>
    </div>

    <!-- Fullscreen Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="absolute top-0 left-0 w-full flex justify-between items-center px-4 app-header z-50">
            <button onclick="closeLightbox()" class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 text-white backdrop-blur-md">
                <span class="material-symbols-rounded">close</span>
            </button>
            <div class="flex gap-4">
                <button id="lb-share" class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 text-white backdrop-blur-md">
                    <span class="material-symbols-rounded">share</span>
                </button>
                <button id="lb-delete" class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 text-white backdrop-blur-md">
                    <span class="material-symbols-rounded">delete</span>
                </button>
            </div>
        </div>
        <div id="lb-content" class="flex-grow flex items-center justify-center overflow-hidden"></div>
    </div>

    <div id="toast" class="fixed bottom-[140px] left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full text-sm opacity-0 transition-opacity z-[300] pointer-events-none"></div>

    <canvas id="cap-canvas" class="hidden"></canvas>

    <script>
        // State Management
        const state = {
            db: null,
            stream: null,
            mode: 'photo', // 'photo' | 'video'
            isRecording: false,
            facingMode: 'environment',
            flash: false,
            settings: { res: 'HD', timer: 0, grid: false },
            media: [],
            currentFilter: 'all',
            selection: new Set(),
            isSelectMode: false,
            mediaRecorder: null,
            chunks: [],
            activeItemIndex: 0
        };

        const els = {
            video: document.getElementById('video-preview'),
            shutter: document.getElementById('shutter'),
            statusText: document.getElementById('status-text'),
            recIndicator: document.getElementById('recording-indicator'),
            galleryTrigger: document.getElementById('gallery-trigger'),
            lastThumb: document.getElementById('last-thumb'),
            gallerySheet: document.getElementById('gallery-sheet'),
            settingsSheet: document.getElementById('settings-sheet'),
            settingsTrigger: document.getElementById('settings-trigger'),
            overlay: document.getElementById('overlay'),
            galleryContent: document.getElementById('gallery-content'),
            timerDisplay: document.getElementById('timer-display'),
            lightbox: document.getElementById('lightbox'),
            lbContent: document.getElementById('lb-content'),
            toast: document.getElementById('toast'),
            canvas: document.getElementById('cap-canvas'),
            grid: document.getElementById('camera-grid')
        };

        // IndexedDB
        async function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open('CameraProDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('media')) {
                        db.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => {
                    state.db = e.target.result;
                    resolve();
                };
                request.onerror = () => {
                    showToast("Database error");
                    resolve();
                };
            });
        }

        async function saveMedia(blob, type) {
            if (!state.db) {
                showToast("Saving failed: DB not ready");
                return;
            }
            return new Promise((resolve) => {
                const transaction = state.db.transaction(['media'], 'readwrite');
                const store = transaction.objectStore('media');
                const item = {
                    blob,
                    type,
                    timestamp: Date.now(),
                    name: `${type}_${Date.now()}.${type === 'photo' ? 'jpg' : 'mp4'}`
                };
                const request = store.add(item);
                request.onsuccess = () => {
                    loadMedia();
                    resolve();
                };
                request.onerror = () => resolve();
            });
        }

        async function loadMedia() {
            if (!state.db) return;
            const transaction = state.db.transaction(['media'], 'readonly');
            const store = transaction.objectStore('media');
            const request = store.getAll();
            request.onsuccess = () => {
                state.media = request.result.sort((a,b) => b.timestamp - a.timestamp);
                renderGallery();
                updateThumb();
            };
        }

        // Camera Engine
        async function startCamera() {
            if (state.stream) state.stream.getTracks().forEach(t => t.stop());

            const constraints = {
                video: {
                    facingMode: state.facingMode,
                    width: { ideal: state.settings.res === '4K' ? 3840 : 1920 },
                    height: { ideal: state.settings.res === '4K' ? 2160 : 1080 }
                },
                audio: true
            };

            try {
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                els.video.srcObject = state.stream;
                await els.video.play();
            } catch (err) {
                showToast("Camera access denied");
            }
        }

        function haptic() {
            if (window.navigator.vibrate) window.navigator.vibrate(15);
        }

        function showToast(msg) {
            els.toast.textContent = msg;
            els.toast.style.opacity = '1';
            setTimeout(() => els.toast.style.opacity = '0', 2500);
        }

        // Photo Capture
        function takePhoto() {
            haptic();
            els.canvas.width = els.video.videoWidth;
            els.canvas.height = els.video.videoHeight;
            const ctx = els.canvas.getContext('2d');
            ctx.drawImage(els.video, 0, 0);
            
            els.canvas.toBlob((blob) => {
                saveMedia(blob, 'photo');
                showToast("Saved Photo");
                
                // Flash animation
                els.video.style.filter = 'brightness(2) contrast(1.2)';
                setTimeout(() => els.video.style.filter = '', 100);
            }, 'image/jpeg', 0.95);
        }

        // Video Recording
        function toggleRecording() {
            if (!state.isRecording) {
                haptic();
                state.chunks = [];
                // iOS Priority: video/mp4
                let mimeType = 'video/mp4';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm;codecs=vp9,opus';
                }

                state.mediaRecorder = new MediaRecorder(state.stream, { mimeType });
                state.mediaRecorder.ondataavailable = (e) => state.chunks.push(e.data);
                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.chunks, { type: mimeType });
                    saveMedia(blob, 'video');
                    showToast("Video Saved");
                };

                state.mediaRecorder.start();
                state.isRecording = true;
                document.body.classList.add('recording');
                els.recIndicator.classList.remove('hidden');
                els.statusText.textContent = "00:00";
                startRecordTimer();
            } else {
                haptic();
                state.mediaRecorder.stop();
                state.isRecording = false;
                document.body.classList.remove('recording');
                els.recIndicator.classList.add('hidden');
                els.statusText.textContent = "Camera Pro";
                clearInterval(state.recordInterval);
            }
        }

        function startRecordTimer() {
            let sec = 0;
            state.recordInterval = setInterval(() => {
                sec++;
                const m = Math.floor(sec / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                els.statusText.textContent = `${m}:${s}`;
            }, 1000);
        }

        // UI Helpers
        function updateThumb() {
            if (state.media.length > 0) {
                const url = URL.createObjectURL(state.media[0].blob);
                els.lastThumb.src = url;
                els.lastThumb.classList.remove('hidden');
                document.getElementById('gallery-empty').classList.add('hidden');
            } else {
                els.lastThumb.classList.add('hidden');
                document.getElementById('gallery-empty').classList.remove('hidden');
            }
        }

        function renderGallery() {
            els.galleryContent.innerHTML = '';
            const filtered = state.media.filter(m => state.currentFilter === 'all' || m.type === state.currentFilter);
            
            filtered.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.onclick = () => state.isSelectMode ? toggleSelect(item.id, div) : openLightbox(item);

                const url = URL.createObjectURL(item.blob);
                if (item.type === 'photo') {
                    div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
                } else {
                    div.innerHTML = `
                        <video src="${url}" class="w-full h-full object-cover"></video>
                        <span class="material-symbols-rounded absolute bottom-2 right-2 text-white text-lg drop-shadow-md">play_circle</span>
                    `;
                }

                if (state.selection.has(item.id)) div.classList.add('brightness-50', 'ring-4', 'ring-blue-500', 'ring-inset');
                els.galleryContent.appendChild(div);
            });
        }

        function toggleSelect(id, el) {
            if (state.selection.has(id)) {
                state.selection.delete(id);
                el.classList.remove('brightness-50', 'ring-4', 'ring-blue-500', 'ring-inset');
            } else {
                state.selection.add(id);
                el.classList.add('brightness-50', 'ring-4', 'ring-blue-500', 'ring-inset');
            }
            document.getElementById('batch-actions').classList.toggle('hidden', state.selection.size === 0);
        }

        function openLightbox(item) {
            els.lbContent.innerHTML = '';
            const url = URL.createObjectURL(item.blob);
            if (item.type === 'photo') {
                els.lbContent.innerHTML = `<img src="${url}" class="max-w-full max-h-full object-contain">`;
            } else {
                els.lbContent.innerHTML = `<video src="${url}" controls autoplay class="max-w-full max-h-full"></video>`;
            }
            els.lightbox.classList.add('active');
            state.activeLightboxId = item.id;
        }

        function closeLightbox() {
            els.lightbox.classList.remove('active');
            els.lbContent.innerHTML = '';
        }

        // Event Listeners
        els.shutter.onclick = () => {
            if (state.settings.timer > 0 && !state.isRecording) {
                let count = state.settings.timer;
                els.timerDisplay.textContent = count;
                els.timerDisplay.classList.remove('hidden');
                const itv = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(itv);
                        els.timerDisplay.classList.add('hidden');
                        state.mode === 'photo' ? takePhoto() : toggleRecording();
                    } else {
                        els.timerDisplay.textContent = count;
                    }
                }, 1000);
            } else {
                state.mode === 'photo' ? takePhoto() : toggleRecording();
            }
        };

        document.getElementById('btn-photo').onclick = () => {
            state.mode = 'photo';
            document.body.classList.remove('mode-video');
            document.getElementById('btn-photo').className = 'px-8 py-2 rounded-full text-sm font-medium bg-blue-100 text-blue-900 transition-all';
            document.getElementById('btn-video').className = 'px-8 py-2 rounded-full text-sm font-medium text-gray-600 transition-all';
        };

        document.getElementById('btn-video').onclick = () => {
            state.mode = 'video';
            document.body.classList.add('mode-video');
            document.getElementById('btn-video').className = 'px-8 py-2 rounded-full text-sm font-medium bg-blue-100 text-blue-900 transition-all';
            document.getElementById('btn-photo').className = 'px-8 py-2 rounded-full text-sm font-medium text-gray-600 transition-all';
        };

        document.getElementById('flip-btn').onclick = () => {
            state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        els.settingsTrigger.onclick = () => {
            els.settingsSheet.classList.add('active');
            els.overlay.classList.add('active');
        };

        els.galleryTrigger.onclick = () => {
            els.gallerySheet.classList.add('active');
            els.overlay.classList.add('active');
            loadMedia();
        };

        els.overlay.onclick = () => {
            els.settingsSheet.classList.remove('active');
            els.gallerySheet.classList.remove('active');
            els.overlay.classList.remove('active');
        };

        document.querySelectorAll('.res-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.res-btn').forEach(b => b.className = 'res-btn flex-1 py-4 rounded-2xl border border-gray-100 bg-white text-gray-600 text-sm font-medium');
                btn.className = 'res-btn flex-1 py-4 rounded-2xl border border-gray-100 bg-blue-50 text-blue-700 text-sm font-medium';
                state.settings.res = btn.dataset.res;
                startCamera();
            };
        });

        document.querySelectorAll('.timer-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.timer-btn').forEach(b => b.className = 'timer-btn flex-1 py-3 rounded-2xl bg-white text-gray-600 text-sm');
                btn.className = 'timer-btn flex-1 py-3 rounded-2xl bg-blue-50 text-blue-700 text-sm';
                state.settings.timer = parseInt(btn.dataset.timer);
            };
        });

        document.getElementById('grid-toggle').onchange = (e) => {
            els.grid.classList.toggle('opacity-100', e.target.checked);
            els.grid.classList.toggle('opacity-0', !e.target.checked);
        };

        document.getElementById('select-mode-btn').onclick = (e) => {
            state.isSelectMode = !state.isSelectMode;
            e.target.textContent = state.isSelectMode ? 'Cancel' : 'Select';
            if (!state.isSelectMode) {
                state.selection.clear();
                document.getElementById('batch-actions').classList.add('hidden');
            }
            renderGallery();
        };

        document.getElementById('delete-batch').onclick = async () => {
            const tx = state.db.transaction(['media'], 'readwrite');
            const store = tx.objectStore('media');
            for (let id of state.selection) store.delete(id);
            tx.oncomplete = () => {
                state.selection.clear();
                document.getElementById('batch-actions').classList.add('hidden');
                loadMedia();
            };
        };

        document.getElementById('lb-delete').onclick = () => {
            const tx = state.db.transaction(['media'], 'readwrite');
            tx.objectStore('media').delete(state.activeLightboxId);
            tx.oncomplete = () => {
                closeLightbox();
                loadMedia();
            };
        };

        document.getElementById('download-zip').onclick = async () => {
            const zip = new JSZip();
            const items = state.media.filter(m => state.selection.has(m.id));
            items.forEach(item => zip.file(item.name, item.blob));
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `CameraPro_Export_${Date.now()}.zip`;
            link.click();
        };

        document.getElementById('flash-btn').onclick = async () => {
            const track = state.stream?.getVideoTracks()[0];
            if (!track) return;
            const caps = track.getCapabilities?.() || {};
            if (caps.torch) {
                state.flash = !state.flash;
                await track.applyConstraints({ advanced: [{ torch: state.flash }] });
                document.getElementById('flash-btn').querySelector('span').textContent = state.flash ? 'flash_on' : 'flash_off';
                document.getElementById('flash-btn').classList.toggle('text-yellow-600', state.flash);
            } else {
                showToast("Flash not supported");
            }
        };

        // Initialize
        window.onload = async () => {
            await initDB();
            await startCamera();
            await loadMedia();
        };
    </script>
</body>
</html>
