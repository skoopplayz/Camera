<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover is critical for iPhone notch support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Material Camera Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #0b57d0;
            --md-sys-color-surface: #f8f9fa;
            --md-sys-color-on-surface: #1f1f1f;
            --md-sys-color-secondary-container: #d3e3fd;
            --md-sys-color-on-secondary-container: #041e49;
        }

        body {
            background-color: #000;
            color: var(--md-sys-color-on-surface);
            margin: 0;
            /* Use dvh for better iPhone Safari height handling */
            height: 100dvh;
            overflow: hidden;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Prevents overscroll bounce on iOS */
            overscroll-behavior: none;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon { font-variation-settings: 'FILL' 1; }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transition: filter 0.1s ease;
        }

        /* Responsive Header Card with Safe Area */
        .header-container {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 12px);
            left: 16px;
            right: 16px;
            z-index: 40;
        }

        .maps-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Control Cluster with Safe Area */
        .bottom-ui-container {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom) + 20px);
            left: 0;
            right: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 40;
        }

        .shutter-btn {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            border: 4px solid white;
            padding: 5px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shutter-btn:active { transform: scale(0.9); }

        .shutter-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-video .shutter-inner { background-color: #d93025; }
        
        .recording .shutter-inner {
            border-radius: 14px;
            transform: scale(0.5);
        }

        #camera-grid {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #camera-grid div { border: 0.5px solid rgba(255,255,255,0.2); }

        .active-chip {
            background-color: var(--md-sys-color-secondary-container) !important;
            color: var(--md-sys-color-on-secondary-container) !important;
        }

        /* iOS-style Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 32px 32px 0 0;
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 100;
            padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
            max-height: 94vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }
        .bottom-sheet.active { transform: translateY(0); }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 90;
        }
        .sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Gallery Grid optimized for iPhone screens */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .gallery-item {
            aspect-ratio: 1;
            position: relative;
            background: #121212;
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lightbox for iPhone */
        #lightbox {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 200;
            display: none;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #lightbox.active { display: flex; }

        .drag-handle {
            width: 36px;
            height: 5px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 12px auto 20px auto;
        }

        .filter-chip {
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f3f4;
            color: #444746;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #toast {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 130px);
            left: 50%;
            transform: translateX(-50%);
            background: #323232;
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            white-space: nowrap;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Main Camera UI -->
    <main class="relative flex-grow overflow-hidden">
        <video id="video-preview" autoplay playsinline muted></video>
        
        <div id="camera-grid">
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
        </div>

        <div id="timer-display" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[120px] text-white font-medium drop-shadow-2xl pointer-events-none z-50 hidden"></div>

        <!-- Header -->
        <div class="header-container">
            <div class="maps-card flex items-center h-14 px-3 gap-1">
                <button id="flash-btn" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-700 hover:bg-gray-100 transition-colors">
                    <span class="material-symbols-rounded">flash_off</span>
                </button>
                <div class="flex-grow text-sm font-medium text-gray-800 px-2 truncate text-center" id="recording-status">
                    Camera Pro
                </div>
                <button id="settings-trigger" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-700 hover:bg-gray-100 transition-colors">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>
        </div>

        <!-- Bottom UI Container -->
        <div class="bottom-ui-container">
            <!-- Mode Switcher -->
            <div id="mode-switcher" class="maps-card flex p-1.5 gap-1">
                <button id="btn-photo-mode" class="px-8 py-2.5 rounded-full text-sm font-medium active-chip transition-all">Photo</button>
                <button id="btn-video-mode" class="px-8 py-2.5 rounded-full text-sm font-medium text-gray-600 transition-all">Video</button>
            </div>

            <!-- Main Controls Cluster -->
            <div class="flex items-center gap-12 mb-2">
                <!-- Gallery Thumbnail -->
                <button id="gallery-trigger" class="w-14 h-14 rounded-2xl bg-black/40 border border-white/20 overflow-hidden backdrop-blur-xl flex items-center justify-center shadow-2xl relative active:scale-90 transition-transform">
                    <span id="gallery-icon" class="material-symbols-rounded text-white/80 text-2xl">photo_library</span>
                    <img id="last-capture-img" class="hidden absolute inset-0 w-full h-full object-cover">
                </button>

                <!-- Shutter -->
                <button id="shutter" class="shutter-btn shadow-2xl">
                    <div class="shutter-inner"></div>
                </button>

                <!-- Flip Camera -->
                <button id="flip-btn" class="w-14 h-14 rounded-full bg-black/40 border border-white/20 backdrop-blur-xl flex items-center justify-center shadow-2xl transition-transform active:scale-90">
                    <span class="material-symbols-rounded text-white text-3xl">flip_camera_android</span>
                </button>
            </div>
        </div>
    </main>

    <!-- UI Components -->
    <div id="sheet-overlay" class="sheet-overlay"></div>
    <div id="toast"></div>

    <!-- Settings Bottom Sheet -->
    <div id="settings-sheet" class="bottom-sheet">
        <div class="drag-handle" onclick="closeSheets()"></div>
        <div class="px-6 pb-6 space-y-6 overflow-y-auto no-scrollbar">
            <h3 class="text-2xl font-medium text-gray-900">Settings</h3>
            
            <div class="space-y-4">
                <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Capture Quality</p>
                <div class="flex gap-3">
                    <button data-res="HD" class="res-toggle flex-1 py-4 rounded-2xl border border-gray-100 text-sm font-medium active-chip shadow-sm transition-all">Full HD</button>
                    <button data-res="4K" class="res-toggle flex-1 py-4 rounded-2xl border border-gray-100 text-sm font-medium bg-gray-50 transition-all">4K Ultra</button>
                </div>
            </div>

            <div class="flex items-center justify-between py-3 border-y border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 rounded-2xl bg-blue-50 flex items-center justify-center">
                        <span class="material-symbols-rounded text-blue-600">grid_4x4</span>
                    </div>
                    <div>
                        <span class="block font-medium">Composition Grid</span>
                        <span class="text-xs text-gray-500">Rule of thirds helper</span>
                    </div>
                </div>
                <button id="grid-toggle" class="w-12 h-7 bg-gray-200 rounded-full relative transition-colors duration-300">
                    <div class="dot absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-all duration-300 shadow-sm"></div>
                </button>
            </div>

            <div class="space-y-4">
                <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Self Timer</p>
                <div class="flex gap-2">
                    <button data-timer="0" class="timer-btn flex-1 py-3.5 rounded-2xl border border-gray-100 text-sm font-medium active-chip">Off</button>
                    <button data-timer="3" class="timer-btn flex-1 py-3.5 rounded-2xl border border-gray-100 text-sm font-medium bg-gray-50">3s</button>
                    <button data-timer="10" class="timer-btn flex-1 py-3.5 rounded-2xl border border-gray-100 text-sm font-medium bg-gray-50">10s</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Gallery Bottom Sheet -->
    <div id="gallery-sheet" class="bottom-sheet">
        <div class="drag-handle" onclick="closeSheets()"></div>
        
        <div class="px-5 pb-4">
            <div class="flex justify-between items-center mb-5">
                <h3 id="gallery-title" class="text-2xl font-medium text-gray-900">Gallery</h3>
                
                <!-- Default Actions -->
                <div class="flex gap-1" id="gallery-actions-default">
                    <button id="btn-select-mode" class="p-2.5 text-gray-700 rounded-full hover:bg-gray-100">
                        <span class="material-symbols-rounded">checklist</span>
                    </button>
                    <button id="bulk-download" class="p-2.5 text-blue-600 rounded-full hover:bg-blue-50">
                        <span class="material-symbols-rounded">download_for_offline</span>
                    </button>
                </div>

                <!-- Selection Actions -->
                <div class="flex items-center gap-2 hidden" id="gallery-actions-selection">
                    <button id="btn-select-all" class="text-sm font-medium text-blue-600 px-4 py-2 rounded-full hover:bg-blue-50">Select All</button>
                    <div class="h-6 w-px bg-gray-200 mx-1"></div>
                    <button id="btn-download-selected" class="p-2.5 text-blue-600 rounded-full hover:bg-blue-50">
                        <span class="material-symbols-rounded">download</span>
                    </button>
                    <button id="btn-delete-selected" class="p-2.5 text-red-500 rounded-full hover:bg-red-50">
                        <span class="material-symbols-rounded">delete</span>
                    </button>
                    <button id="btn-cancel-selection" class="p-2.5 text-gray-500 rounded-full hover:bg-gray-100">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
            </div>

            <!-- Selection Banner -->
            <div id="selection-banner" class="hidden mb-4 py-3 px-5 bg-blue-50 text-blue-700 rounded-2xl text-sm font-medium flex justify-between items-center animate-in fade-in slide-in-from-top-2 duration-300">
                <span id="selection-count">0 selected</span>
            </div>

            <!-- Filter Chips -->
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                <button class="filter-chip active-chip" data-filter="all">All Media</button>
                <button class="filter-chip" data-filter="image">Photos</button>
                <button class="filter-chip" data-filter="video">Videos</button>
            </div>
        </div>

        <!-- Media Grid -->
        <div id="gallery-content" class="gallery-grid"></div>
        
        <div id="empty-gallery" class="py-24 text-center text-gray-400 hidden">
            <span class="material-symbols-rounded text-6xl block mb-4 opacity-20">photo_library</span>
            <p class="font-medium text-gray-500">Nothing captured yet</p>
            <p class="text-sm opacity-60">Photos and videos will appear here</p>
        </div>
    </div>

    <!-- Lightbox Viewer -->
    <div id="lightbox">
        <!-- Lightbox Toolbar -->
        <div class="flex justify-between items-center p-5 text-white z-50 bg-gradient-to-b from-black/60 to-transparent">
            <button id="lightbox-close" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 active:scale-90 transition-all">
                <span class="material-symbols-rounded">close</span>
            </button>
            <div id="lightbox-meta" class="text-center">
                <p class="text-sm font-medium" id="lightbox-date">Jan 01, 2024</p>
                <p class="text-[10px] opacity-60 uppercase tracking-widest mt-0.5" id="lightbox-time">12:00 PM</p>
            </div>
            <div class="flex gap-2">
                <button id="lightbox-share" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 active:scale-90 transition-all">
                    <span class="material-symbols-rounded">share</span>
                </button>
                <button id="lightbox-delete" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 text-red-400 active:scale-90 transition-all">
                    <span class="material-symbols-rounded">delete</span>
                </button>
            </div>
        </div>

        <!-- Lightbox Main -->
        <div class="flex-grow flex items-center justify-center relative">
            <div id="lightbox-main" class="w-full h-full flex items-center justify-center"></div>
            
            <button id="lightbox-prev" class="absolute left-4 w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-white/50 hover:text-white transition-all">
                <span class="material-symbols-rounded text-4xl">chevron_left</span>
            </button>
            <button id="lightbox-next" class="absolute right-4 w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-white/50 hover:text-white transition-all">
                <span class="material-symbols-rounded text-4xl">chevron_right</span>
            </button>
        </div>

        <!-- Lightbox Footer -->
        <div id="lightbox-footer" class="p-8 pb-10 flex justify-center bg-gradient-to-t from-black/60 to-transparent z-50">
            <button id="lightbox-download" class="px-12 py-4 bg-white text-black rounded-full font-medium flex items-center gap-3 shadow-2xl active:scale-95 transition-all">
                <span class="material-symbols-rounded fill-icon">download</span>
                Save to Device
            </button>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
        const DB_NAME = "CameraProDB";
        const STORE_NAME = "media";
        let db;

        const state = {
            stream: null,
            mode: 'photo',
            isRecording: false,
            facingMode: 'environment', 
            flash: false,
            mediaRecorder: null,
            chunks: [],
            settings: { res: 'HD', grid: false, timer: 0 },
            timerRunning: false,
            galleryItems: [],
            selectionMode: false,
            selectedIds: new Set(),
            currentFilter: 'all',
            lightboxIndex: -1,
            get currentViewingItems() {
                return this.galleryItems.filter(i => this.currentFilter === 'all' || i.type === this.currentFilter);
            }
        };

        const els = {
            video: document.getElementById('video-preview'),
            shutter: document.getElementById('shutter'),
            modePhoto: document.getElementById('btn-photo-mode'),
            modeVideo: document.getElementById('btn-video-mode'),
            modeSwitcher: document.getElementById('mode-switcher'),
            flash: document.getElementById('flash-btn'),
            flip: document.getElementById('flip-btn'),
            canvas: document.getElementById('capture-canvas'),
            settingsTrigger: document.getElementById('settings-trigger'),
            settingsSheet: document.getElementById('settings-sheet'),
            galleryTrigger: document.getElementById('gallery-trigger'),
            gallerySheet: document.getElementById('gallery-sheet'),
            overlay: document.getElementById('sheet-overlay'),
            grid: document.getElementById('camera-grid'),
            gridToggle: document.getElementById('grid-toggle'),
            timerDisplay: document.getElementById('timer-display'),
            lastThumb: document.getElementById('last-capture-img'),
            galleryIcon: document.getElementById('gallery-icon'),
            status: document.getElementById('recording-status'),
            galleryContent: document.getElementById('gallery-content'),
            emptyGallery: document.getElementById('empty-gallery'),
            bulkDownload: document.getElementById('bulk-download'),
            toast: document.getElementById('toast'),
            btnSelectMode: document.getElementById('btn-select-mode'),
            btnCancelSelection: document.getElementById('btn-cancel-selection'),
            btnSelectAll: document.getElementById('btn-select-all'),
            actionsDefault: document.getElementById('gallery-actions-default'),
            actionsSelection: document.getElementById('gallery-actions-selection'),
            selectionBanner: document.getElementById('selection-banner'),
            selectionCount: document.getElementById('selection-count'),
            btnDeleteSelected: document.getElementById('btn-delete-selected'),
            btnDownloadSelected: document.getElementById('btn-download-selected'),
            lightbox: document.getElementById('lightbox'),
            lightboxMain: document.getElementById('lightbox-main'),
            lightboxClose: document.getElementById('lightbox-close'),
            lightboxDate: document.getElementById('lightbox-date'),
            lightboxTime: document.getElementById('lightbox-time'),
            lightboxDelete: document.getElementById('lightbox-delete'),
            lightboxDownload: document.getElementById('lightbox-download'),
            lightboxShare: document.getElementById('lightbox-share'),
            lightboxPrev: document.getElementById('lightbox-prev'),
            lightboxNext: document.getElementById('lightbox-next'),
            lightboxFooter: document.getElementById('lightbox-footer')
        };

        // --- Database ---
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
            });
        };

        // --- Camera Core ---
        async function startCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
            }

            const constraints = {
                video: {
                    facingMode: state.facingMode,
                    width: state.settings.res === '4K' ? { ideal: 3840 } : { ideal: 1920 },
                    height: state.settings.res === '4K' ? { ideal: 2160 } : { ideal: 1080 }
                },
                audio: true
            };

            try {
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                els.video.srcObject = state.stream;
                const track = state.stream.getVideoTracks()[0];
                const actualFacing = track.getSettings().facingMode;
                els.video.style.transform = actualFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            } catch (err) {
                showToast("Camera access is required");
            }
        }

        function takePhoto() {
            if (!els.video.videoWidth) return;
            els.canvas.width = els.video.videoWidth;
            els.canvas.height = els.video.videoHeight;
            const ctx = els.canvas.getContext('2d');
            
            if (state.facingMode === 'user') {
                ctx.translate(els.canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(els.video, 0, 0);
            
            els.canvas.toBlob(blob => saveToGallery(blob, 'image'), 'image/jpeg', 0.95);
            els.video.style.filter = 'brightness(1.5)';
            setTimeout(() => els.video.style.filter = '', 100);
        }

        let recordInterval, startTime;
        function toggleRecording() {
            if (!state.isRecording) {
                state.chunks = [];
                // iPhone typically prefers H.264
                let mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
                
                state.mediaRecorder = new MediaRecorder(state.stream, { mimeType });
                state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.chunks, { type: state.mediaRecorder.mimeType });
                    saveToGallery(blob, 'video');
                    clearInterval(recordInterval);
                    els.status.textContent = "Camera Pro";
                    els.status.classList.remove('text-red-600');
                    setRecordingLock(false);
                };

                state.mediaRecorder.start();
                state.isRecording = true;
                setRecordingLock(true);
                els.shutter.classList.add('recording');
                els.status.classList.add('text-red-600');
                
                startTime = Date.now();
                recordInterval = setInterval(() => {
                    const diff = Math.floor((Date.now() - startTime) / 1000);
                    const m = Math.floor(diff/60).toString().padStart(2, '0');
                    const s = (diff%60).toString().padStart(2, '0');
                    els.status.textContent = `REC • ${m}:${s}`;
                }, 1000);
            } else {
                state.mediaRecorder.stop();
                state.isRecording = false;
                els.shutter.classList.remove('recording');
            }
        }

        // --- Gallery & Storage ---
        async function saveToGallery(blob, type) {
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            const item = {
                blob: blob,
                type: type,
                timestamp: Date.now(),
                filename: `${type === 'image' ? 'IMG' : 'VID'}_${Date.now()}.${type === 'image' ? 'jpg' : 'mp4'}`
            };
            store.add(item);
            
            await loadGalleryItems();
            updateThumb();
            showToast(type === 'image' ? "Photo saved" : "Video saved");
        }

        async function loadGalleryItems() {
            return new Promise(resolve => {
                const transaction = db.transaction([STORE_NAME], "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    state.galleryItems = request.result.sort((a,b) => b.timestamp - a.timestamp);
                    resolve(state.galleryItems);
                };
            });
        }

        function renderGallery() {
            els.galleryContent.innerHTML = '';
            const filtered = state.galleryItems.filter(i => state.currentFilter === 'all' || i.type === state.currentFilter);
            
            if (filtered.length === 0) {
                els.emptyGallery.classList.remove('hidden');
            } else {
                els.emptyGallery.classList.add('hidden');
                filtered.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = `gallery-item ${state.selectedIds.has(item.id) ? 'selected ring-4 ring-blue-500 ring-inset' : ''}`;
                    const url = URL.createObjectURL(item.blob);
                    
                    if (item.type === 'image') {
                        div.innerHTML = `<img src="${url}" loading="lazy">`;
                    } else {
                        div.innerHTML = `
                            <video src="${url}#t=0.5" muted playsinline></video>
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                                <span class="material-symbols-rounded text-white text-3xl opacity-80 fill-icon">play_circle</span>
                            </div>
                        `;
                    }

                    div.onclick = () => {
                        if (state.selectionMode) {
                            if (state.selectedIds.has(item.id)) state.selectedIds.delete(item.id);
                            else state.selectedIds.add(item.id);
                            updateSelectionUI();
                            renderGallery();
                        } else {
                            openLightbox(index);
                        }
                    };
                    els.galleryContent.appendChild(div);
                });
            }
        }

        // --- Lightbox ---
        function openLightbox(index) {
            state.lightboxIndex = index;
            els.lightbox.classList.add('active');
            updateLightboxContent();
        }

        function updateLightboxContent() {
            const items = state.currentViewingItems;
            const item = items[state.lightboxIndex];
            if (!item) return;

            els.lightboxMain.innerHTML = '';
            const url = URL.createObjectURL(item.blob);
            
            if (item.type === 'image') {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'max-w-full max-h-full object-contain';
                els.lightboxMain.appendChild(img);
            } else {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.playsinline = true;
                video.autoplay = true;
                video.className = 'max-w-full max-h-full';
                els.lightboxMain.appendChild(video);
            }

            const d = new Date(item.timestamp);
            els.lightboxDate.textContent = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            els.lightboxTime.textContent = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

            els.lightboxPrev.classList.toggle('invisible', state.lightboxIndex === 0);
            els.lightboxNext.classList.toggle('invisible', state.lightboxIndex === items.length - 1);
        }

        function closeLightbox() {
            els.lightbox.classList.remove('active');
            els.lightboxMain.innerHTML = '';
            state.lightboxIndex = -1;
        }

        function navigateLightbox(dir) {
            const items = state.currentViewingItems;
            const newIdx = state.lightboxIndex + dir;
            if (newIdx >= 0 && newIdx < items.length) {
                state.lightboxIndex = newIdx;
                updateLightboxContent();
            }
        }

        // --- UI Interactions ---
        function showToast(msg) {
            els.toast.textContent = msg;
            els.toast.style.opacity = '1';
            els.toast.style.transform = 'translateX(-50%) translateY(-10px)';
            setTimeout(() => {
                els.toast.style.opacity = '0';
                els.toast.style.transform = 'translateX(-50%) translateY(0)';
            }, 2000);
        }

        function setRecordingLock(locked) {
            [els.flip, els.modeSwitcher, els.settingsTrigger, els.galleryTrigger].forEach(el => {
                el.style.pointerEvents = locked ? 'none' : 'auto';
                el.style.opacity = locked ? '0.3' : '1';
            });
        }

        function closeSheets() {
            els.settingsSheet.classList.remove('active');
            els.gallerySheet.classList.remove('active');
            els.overlay.classList.remove('active');
            toggleSelectionMode(false);
        }

        async function updateThumb() {
            if (state.galleryItems.length > 0) {
                const last = state.galleryItems[0];
                els.lastThumb.src = URL.createObjectURL(last.blob);
                els.lastThumb.classList.remove('hidden');
                els.galleryIcon.classList.add('hidden');
            } else {
                els.lastThumb.classList.add('hidden');
                els.galleryIcon.classList.remove('hidden');
            }
        }

        function toggleSelectionMode(active) {
            state.selectionMode = active;
            state.selectedIds.clear();
            els.actionsDefault.classList.toggle('hidden', active);
            els.actionsSelection.classList.toggle('hidden', !active);
            els.selectionBanner.classList.toggle('hidden', !active);
            updateSelectionUI();
            renderGallery();
        }

        function updateSelectionUI() {
            els.selectionCount.textContent = `${state.selectedIds.size} selected`;
        }

        async function downloadItems(items) {
            if (items.length === 1) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(items[0].blob);
                a.download = items[0].filename;
                a.click();
            } else {
                showToast("Zipping media...");
                const zip = new JSZip();
                items.forEach(item => zip.file(item.filename, item.blob));
                const content = await zip.generateAsync({ type: "blob" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = `Media_Pack_${Date.now()}.zip`;
                a.click();
            }
        }

        async function deleteItems(ids) {
            const tx = db.transaction([STORE_NAME], "readwrite");
            const store = tx.objectStore(STORE_NAME);
            ids.forEach(id => store.delete(id));
            tx.oncomplete = async () => {
                await loadGalleryItems();
                renderGallery();
                updateThumb();
                showToast("Deleted successfully");
            };
        }

        // --- Event Listeners ---
        els.shutter.onclick = () => {
            if (state.timerRunning) return;
            if (state.settings.timer > 0 && !state.isRecording) {
                state.timerRunning = true;
                let count = state.settings.timer;
                els.timerDisplay.classList.remove('hidden');
                els.timerDisplay.textContent = count;
                const itv = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(itv);
                        els.timerDisplay.classList.add('hidden');
                        state.timerRunning = false;
                        state.mode === 'photo' ? takePhoto() : toggleRecording();
                    } else els.timerDisplay.textContent = count;
                }, 1000);
            } else {
                state.mode === 'photo' ? takePhoto() : toggleRecording();
            }
        };

        els.galleryTrigger.onclick = async () => {
            await loadGalleryItems();
            renderGallery();
            els.gallerySheet.classList.add('active');
            els.overlay.classList.add('active');
        };

        els.settingsTrigger.onclick = () => {
            els.settingsSheet.classList.add('active');
            els.overlay.classList.add('active');
        };

        els.overlay.onclick = closeSheets;

        els.modePhoto.onclick = () => {
            state.mode = 'photo';
            els.modePhoto.classList.add('active-chip');
            els.modeVideo.classList.remove('active-chip');
            document.body.classList.remove('mode-video');
        };

        els.modeVideo.onclick = () => {
            state.mode = 'video';
            els.modeVideo.classList.add('active-chip');
            els.modePhoto.classList.remove('active-chip');
            document.body.classList.add('mode-video');
        };

        els.flip.onclick = () => {
            state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        els.btnSelectMode.onclick = () => toggleSelectionMode(true);
        els.btnCancelSelection.onclick = () => toggleSelectionMode(false);
        els.btnSelectAll.onclick = () => {
            const filtered = state.currentViewingItems;
            if (state.selectedIds.size === filtered.length) state.selectedIds.clear();
            else filtered.forEach(item => state.selectedIds.add(item.id));
            updateSelectionUI();
            renderGallery();
        };

        els.btnDeleteSelected.onclick = () => {
            if (state.selectedIds.size > 0) {
                deleteItems([...state.selectedIds]);
                toggleSelectionMode(false);
            }
        };

        els.btnDownloadSelected.onclick = () => {
            const sel = state.galleryItems.filter(i => state.selectedIds.has(i.id));
            if (sel.length > 0) downloadItems(sel);
        };

        els.bulkDownload.onclick = () => downloadItems(state.galleryItems);

        els.lightboxClose.onclick = closeLightbox;
        els.lightboxPrev.onclick = () => navigateLightbox(-1);
        els.lightboxNext.onclick = () => navigateLightbox(1);
        els.lightboxDelete.onclick = () => {
            const item = state.currentViewingItems[state.lightboxIndex];
            if (item) {
                deleteItems([item.id]);
                closeLightbox();
            }
        };
        els.lightboxDownload.onclick = () => {
            const item = state.currentViewingItems[state.lightboxIndex];
            if (item) downloadItems([item]);
        };

        els.lightboxShare.onclick = async () => {
            const item = state.currentViewingItems[state.lightboxIndex];
            if (item && navigator.share) {
                const file = new File([item.blob], item.filename, { type: item.blob.type });
                try {
                    await navigator.share({ files: [file], title: 'Camera Pro' });
                } catch (e) { console.error("Share failed", e); }
            } else showToast("Sharing not supported");
        };

        document.querySelectorAll('.res-toggle').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.res-toggle').forEach(b => b.classList.remove('active-chip'));
                btn.classList.add('active-chip');
                state.settings.res = btn.dataset.res;
                startCamera();
            };
        });

        els.gridToggle.onclick = () => {
            state.settings.grid = !state.settings.grid;
            els.grid.style.opacity = state.settings.grid ? '1' : '0';
            els.gridToggle.classList.toggle('bg-blue-600', state.settings.grid);
            els.gridToggle.querySelector('.dot').style.transform = state.settings.grid ? 'translateX(20px)' : 'translateX(0)';
        };

        document.querySelectorAll('.timer-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active-chip'));
                btn.classList.add('active-chip');
                state.settings.timer = parseInt(btn.dataset.timer);
            };
        });

        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active-chip'));
                btn.classList.add('active-chip');
                state.currentFilter = btn.dataset.filter;
                renderGallery();
            };
        });

        els.flash.onclick = async () => {
            const track = state.stream?.getVideoTracks()[0];
            const caps = track?.getCapabilities?.() || {};
            if (caps.torch) {
                state.flash = !state.flash;
                await track.applyConstraints({ advanced: [{ torch: state.flash }] });
                els.flash.querySelector('span').textContent = state.flash ? 'flash_on' : 'flash_off';
                els.flash.classList.toggle('text-yellow-500', state.flash);
            } else showToast("Flash not supported");
        };

        window.onload = async () => {
            await initDB();
            await startCamera();
            await loadGalleryItems();
            updateThumb();
        };
    </script>
</body>
</html>
